name: news-trend-develop

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: infra/airflow/Dockerfile.airflow
  env_file:
    - ./.env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@app-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW_CONFIG: /opt/airflow/config/airflow.cfg
    PYTHONPATH: /opt/news-trend-pipeline/src
    NEWS_PROVIDERS: ${NEWS_PROVIDERS:-naver,rss}
    KAFKA_CONTAINER_NAME: ${KAFKA_CONTAINER_NAME:-kafka}
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    STATE_DIR: /opt/news-trend-pipeline/runtime/state
    POSTGRES_HOST: app-postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: ${POSTGRES_DB:-news_pipeline}
    POSTGRES_USER: ${POSTGRES_USER:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    SPARK_MASTER: spark://spark-master:7077
    SPARK_APP_NAME: ${SPARK_APP_NAME:-news-trend-pipeline}
    SPARK_CHECKPOINT_DIR: /opt/news-trend-pipeline/runtime/checkpoints
    NAVER_MAX_WORKERS: ${NAVER_MAX_WORKERS:-4}
    NAVER_PAGE_REQUEST_DELAY_SECONDS: ${NAVER_PAGE_REQUEST_DELAY_SECONDS:-0.75}
    NAVER_QUERY_STAGGER_SECONDS: ${NAVER_QUERY_STAGGER_SECONDS:-0.15}
    RSS_FEED_CATALOG_PATH: ${RSS_FEED_CATALOG_PATH:-/opt/news-trend-pipeline/data/rss_feeds.csv}
    RSS_REQUEST_TIMEOUT_SECONDS: ${RSS_REQUEST_TIMEOUT_SECONDS:-20}
    RSS_MAX_WORKERS: ${RSS_MAX_WORKERS:-8}
  volumes:
    - ./src:/opt/news-trend-pipeline/src
    - ./data:/opt/news-trend-pipeline/data:ro
    - ./runtime/state:/opt/news-trend-pipeline/runtime/state
    - ./airflow/dags:/opt/airflow/dags
    - ./runtime/logs:/opt/airflow/logs
    - ./infra/airflow/config:/opt/airflow/config
    - ./infra/airflow/plugins:/opt/airflow/plugins
    - /var/run/docker.sock:/var/run/docker.sock
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    kafka:
      condition: service_started
    kafka-init:
      condition: service_completed_successfully
    app-postgres:
      condition: service_healthy
    app-postgres-init:
      condition: service_completed_successfully
    spark-master:
      condition: service_started
  networks:
    - dev-network

x-spark-runtime: &spark-runtime
  build:
    context: .
    dockerfile: infra/spark/Dockerfile.spark
  image: news-trend-spark-runtime:latest
  restart: unless-stopped
  volumes:
    - ./src:/opt/news-trend-pipeline/src
    - ./runtime/spark-events:/tmp/spark-events
  networks:
    - dev-network
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - dev-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ${KAFKA_CONTAINER_NAME:-kafka}
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    healthcheck:
      test:
        - CMD-SHELL
        - cub kafka-ready -b localhost:9092 1 10
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
        
    networks:
      - dev-network

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka
    entrypoint: /bin/bash
    command:
      - -lc
      - |
        cub kafka-ready -b kafka:29092 1 30
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic news_topic --partitions 2 --replication-factor 1
    networks:
      - dev-network

  app-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-news_pipeline}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - app-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-news_pipeline}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - dev-network

  app-postgres-init:
    image: postgres:16
    restart: "no"
    depends_on:
      app-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-news_pipeline}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      AIRFLOW_DB: airflow
      AIRFLOW_USER: airflow
      AIRFLOW_PASSWORD: airflow
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        psql -h app-postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -v ON_ERROR_STOP=1 -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'airflow') THEN CREATE ROLE airflow LOGIN PASSWORD '$${AIRFLOW_PASSWORD}'; ELSE ALTER ROLE airflow LOGIN PASSWORD '$${AIRFLOW_PASSWORD}'; END IF; END \$\$;"
        if ! psql -h app-postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -tAc "SELECT 1 FROM pg_database WHERE datname = '$${AIRFLOW_DB}'" | grep -q 1; then
          createdb -h app-postgres -U "$${POSTGRES_USER}" -O "$${AIRFLOW_USER}" "$${AIRFLOW_DB}"
        fi
        psql -h app-postgres -U "$${POSTGRES_USER}" -d "$${AIRFLOW_DB}" -v ON_ERROR_STOP=1 -c "ALTER DATABASE $${AIRFLOW_DB} OWNER TO $${AIRFLOW_USER};"
        psql -h app-postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -v ON_ERROR_STOP=1 -f /opt/news-trend-pipeline/src/storage/models.sql
    volumes:
      - ./src/storage/models.sql:/opt/news-trend-pipeline/src/storage/models.sql:ro
    networks:
      - dev-network

  api-server:
    build:
      context: .
      dockerfile: infra/api/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: app-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-news_pipeline}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PYTHONPATH: /app/src
      RSS_FEED_CATALOG_PATH: ${RSS_FEED_CATALOG_PATH:-/app/data/rss_feeds.csv}
      NAVER_MAX_WORKERS: ${NAVER_MAX_WORKERS:-4}
      NAVER_PAGE_REQUEST_DELAY_SECONDS: ${NAVER_PAGE_REQUEST_DELAY_SECONDS:-0.75}
      NAVER_QUERY_STAGGER_SECONDS: ${NAVER_QUERY_STAGGER_SECONDS:-0.15}
    depends_on:
      app-postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      spark-master:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data:ro
    networks:
      - dev-network

  frontend-server:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - api-server
    ports:
      - "3000:5173"
    volumes:
      - ./src/dashboard:/app
      - frontend-node-modules:/app/node_modules
    networks:
      - dev-network

  spark-master:
    build:
      context: .
      dockerfile: infra/spark/Dockerfile.spark
    image: news-trend-spark-runtime:latest
    restart: unless-stopped
    command: >
      bash -lc "/opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8080"
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./src:/opt/news-trend-pipeline/src
      - ./runtime/spark-events:/tmp/spark-events
    networks:
      - dev-network

  spark-worker-1:
    image: news-trend-spark-runtime:latest
    restart: unless-stopped
    depends_on:
      - spark-master
    command: >
      bash -lc "/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      --cores 1 --memory 2G --webui-port 8081 spark://spark-master:7077"
    ports:
      - "8081:8081"
    volumes:
      - ./src:/opt/news-trend-pipeline/src
      - ./runtime/spark-events:/tmp/spark-events
    networks:
      - dev-network

  spark-worker-2:
    image: news-trend-spark-runtime:latest
    restart: unless-stopped
    depends_on:
      - spark-master
    command: >
      bash -lc "/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      --cores 1 --memory 2G --webui-port 8081 spark://spark-master:7077"
    ports:
      - "8082:8081"
    volumes:
      - ./src:/opt/news-trend-pipeline/src
      - ./runtime/spark-events:/tmp/spark-events
    networks:
      - dev-network

  spark-history:
    image: news-trend-spark-runtime:latest
    restart: unless-stopped
    command: >
      bash -lc "/opt/spark/sbin/start-history-server.sh;
      sleep infinity"
    environment:
      SPARK_HISTORY_OPTS: >-
        -Dspark.history.fs.logDirectory=file:/tmp/spark-events
        -Dspark.history.ui.port=18080
        -Dspark.history.fs.cleaner.enabled=true
        -Dspark.history.fs.cleaner.interval=1h
        -Dspark.history.fs.cleaner.maxAge=7d
    volumes:
      - ./runtime/spark-events:/tmp/spark-events
    ports:
      - "18080:18080"
    networks:
      - dev-network

  spark-streaming:
    image: news-trend-spark-runtime:latest
    hostname: spark-streaming
    env_file:
      - ./.env
    environment:
      PYTHONPATH: /opt/news-trend-pipeline/src
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: app-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-news_pipeline}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPARK_MASTER: spark://spark-master:7077
      SPARK_CHECKPOINT_DIR: /opt/news-trend-pipeline/runtime/checkpoints
      SPARK_DRIVER_HOST: ${SPARK_DRIVER_HOST:-spark-streaming}
      SPARK_DRIVER_BIND_ADDRESS: ${SPARK_DRIVER_BIND_ADDRESS:-0.0.0.0}
      SPARK_DRIVER_PORT: ${SPARK_DRIVER_PORT:-7078}
      SPARK_BLOCK_MANAGER_PORT: ${SPARK_BLOCK_MANAGER_PORT:-7079}
      SPARK_UI_PORT: ${SPARK_UI_PORT:-4040}
      SPARK_EVENT_LOG_ENABLED: ${SPARK_EVENT_LOG_ENABLED:-true}
      SPARK_EVENT_LOG_DIR: ${SPARK_EVENT_LOG_DIR:-file:/tmp/spark-events}
      NAVER_MAX_WORKERS: ${NAVER_MAX_WORKERS:-4}
      NAVER_PAGE_REQUEST_DELAY_SECONDS: ${NAVER_PAGE_REQUEST_DELAY_SECONDS:-0.75}
      NAVER_QUERY_STAGGER_SECONDS: ${NAVER_QUERY_STAGGER_SECONDS:-0.15}
    command: >
      bash -lc "mkdir -p /tmp/.ivy2 /opt/news-trend-pipeline/runtime/checkpoints /tmp/spark-events &&
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --conf spark.jars.ivy=/tmp/.ivy2
      --conf spark.driver.host=$${SPARK_DRIVER_HOST}
      --conf spark.driver.bindAddress=$${SPARK_DRIVER_BIND_ADDRESS}
      --conf spark.driver.port=$${SPARK_DRIVER_PORT}
      --conf spark.blockManager.port=$${SPARK_BLOCK_MANAGER_PORT}
      --conf spark.ui.port=$${SPARK_UI_PORT}
      --conf spark.eventLog.enabled=$${SPARK_EVENT_LOG_ENABLED}
      --conf spark.eventLog.dir=$${SPARK_EVENT_LOG_DIR}
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.7,org.postgresql:postgresql:42.7.4
      /opt/news-trend-pipeline/scripts/run_processing.py"
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_started
      app-postgres:
        condition: service_healthy
      spark-master:
        condition: service_started
      spark-worker-1:
        condition: service_started
      spark-worker-2:
        condition: service_started
    ports:
      - "4040:4040"
      - "7078:7078"
      - "7079:7079"
    volumes:
      - ./src:/opt/news-trend-pipeline/src
      - ./scripts:/opt/news-trend-pipeline/scripts
      - ./runtime/checkpoints:/opt/news-trend-pipeline/runtime/checkpoints
      - ./runtime/spark-events:/tmp/spark-events
    networks:
      - dev-network
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "9080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins /opt/airflow/config
        mkdir -p /opt/news-trend-pipeline/runtime/state
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow /opt/news-trend-pipeline/runtime/state
        /entrypoint airflow db migrate
        /entrypoint airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME:-airflow}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD:-airflow}" \
          --firstname Local \
          --lastname Admin \
          --role Admin \
          --email admin@example.com
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"

networks:
  dev-network:
    driver: bridge

volumes:
  app-postgres-data:
  frontend-node-modules:
